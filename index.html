<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap');

    :root {
      --bg: #0a0a0a;
      --fg: #f0ede6;
      --accent: #c8f564;
      --dim: #3a3a3a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg);
      color: var(--fg);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--dim) 1px, transparent 1px),
        linear-gradient(90deg, var(--dim) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.15;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .label {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.2s;
    }

    .label span {
      background: var(--accent);
      color: var(--bg);
      padding: 2px 10px;
      border-radius: 2px;
      font-weight: 400;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(4rem, 12vw, 9rem);
      line-height: 1;
      letter-spacing: -0.02em;
      color: var(--fg);
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.5s;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .subtitle {
      margin-top: 2rem;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: #555;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.9s;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--accent);
      margin-left: 4px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }

    /* TypeScript badge */
    .ts-badge {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: #444;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards 1.3s;
    }

    .ts-badge .dot {
      width: 6px;
      height: 6px;
      background: #3178c6;
      border-radius: 50%;
    }

    /* Step counter */
    .step-info {
      position: fixed;
      top: 2rem;
      left: 2rem;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: #333;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards 1.5s;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="step-info">ADIM 01 / VİBE CODİNG</div>

  <div class="container">
    <p class="label"><span>typescript</span></p>
    <h1>Hello, <em>World</em><span class="cursor"></span></h1>
    <p class="subtitle">İlk adımını attın. Bundan sonrası daha güzel.</p>
  </div>

  <div class="ts-badge">
    <span class="dot"></span>
    TypeScript · HTML · CSS
  </div>

  <script>
    // TypeScript mantığı (tarayıcıda çalışan JS olarak)
    // Gerçek projede: tsc hello.ts → hello.js şeklinde derlenir

    interface Greeting {
      message: string;
      author: string;
      timestamp: Date;
    }

    const greeting: Greeting = {
      message: "Hello, World",
      author: "Vibe Coder",
      timestamp: new Date()
    };

    console.log("🚀 Proje başladı!");
    console.log(`Mesaj: ${greeting.message}`);
    console.log(`Zaman: ${greeting.timestamp.toLocaleString('tr-TR')}`);
    console.log("TypeScript tipi koruması aktif ✓");
  </script>

</body>
</html>
