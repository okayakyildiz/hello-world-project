<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alışkanlık Takip</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg:           #E8E2DB;
      --surface:      #f0ece6;
      --card:         #faf8f5;
      --border:       #cfc8be;
      --text:         #1A3263;
      --text-dim:     #547792;
      --accent:       #1A3263;
      --accent-light: #dde4f0;
      --accent2:      #FAB95B;
      --danger:       #c0392b;
      --danger-bg:    #fde8e8;
      --radius:       12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 240px 1fr;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      background: var(--accent);
      padding: 2rem 1.25rem;
      display: flex; flex-direction: column; gap: 2rem;
      min-height: 100vh; position: sticky; top: 0;
    }
    .logo { font-size: 0.95rem; font-weight: 800; color: #E8E2DB; display: flex; align-items: center; gap: 0.5rem; padding: 0 0.5rem; }
    .logo-dot { width: 9px; height: 9px; background: var(--accent2); border-radius: 50%; flex-shrink: 0; }
    .streak-card { background: var(--accent2); border-radius: var(--radius); padding: 1.1rem 1.2rem; }
    .streak-num   { font-size: 2.6rem; font-weight: 800; line-height: 1; color: var(--accent); }
    .streak-label { font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); opacity: 0.7; margin-top: 0.25rem; font-weight: 700; }
    .nav { display: flex; flex-direction: column; gap: 0.25rem; }
    .nav-title { font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: #547792; margin-bottom: 0.4rem; font-weight: 700; padding: 0 0.5rem; }
    .nav-item { display: flex; align-items: center; gap: 0.7rem; padding: 0.6rem 0.9rem; border-radius: 8px; font-size: 0.875rem; font-weight: 500; cursor: pointer; transition: background 0.15s, color 0.15s; color: #7a94b0; }
    .nav-item:hover  { background: rgba(255,255,255,0.07); color: #E8E2DB; }
    .nav-item.active { background: rgba(250,185,91,0.15); color: var(--accent2); font-weight: 700; }
    .nav-icon { font-size: 0.95rem; width: 18px; text-align: center; flex-shrink: 0; }
    .sidebar-footer { margin-top: auto; font-size: 0.68rem; color: #3d5570; font-weight: 600; padding: 0 0.5rem; }

    /* ── DB STATUS ── */
    .db-status { display: flex; align-items: center; gap: 0.4rem; font-size: 0.65rem; font-weight: 600; padding: 0 0.5rem; }
    .db-dot { width: 7px; height: 7px; border-radius: 50%; background: #547792; transition: background 0.3s; }
    .db-dot.connected  { background: #4caf7d; }
    .db-dot.error      { background: var(--danger); }
    .db-dot.loading    { background: var(--accent2); animation: pulse 1s infinite; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── CONTENT ── */
    .content { display: flex; flex-direction: column; min-height: 100vh; overflow-y: auto; }

    /* ── PAGE HEADER ── */
    .page-header { padding: 1.75rem 2.25rem 1rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 10; }
    .page-header h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.02em; }
    .page-header .sub { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--text-dim); margin-top: 0.2rem; }

    /* ── BUTTONS ── */
    .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.55rem 1.1rem; border-radius: 8px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.8rem; font-weight: 700; cursor: pointer; border: none; transition: all 0.15s; white-space: nowrap; }
    .btn-primary { background: var(--accent); color: #E8E2DB; }
    .btn-primary:hover { background: #142750; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-ghost  { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
    .btn-ghost:hover  { background: var(--surface); }
    .btn-danger { background: var(--danger-bg); color: var(--danger); border: 1.5px solid #e8a0a0; }
    .btn-danger:hover { background: #fbd0d0; }
    .btn-sm { padding: 0.4rem 0.85rem; font-size: 0.75rem; }

    /* ── PAGES ── */
    .page { display: none; flex-direction: column; gap: 1.75rem; padding: 2rem 2.25rem; flex: 1; }
    .page.active { display: flex; }

    /* ── LOADING OVERLAY ── */
    .loading-overlay { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; padding: 4rem; color: var(--text-dim); font-size: 0.85rem; font-weight: 600; }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── SECTION ── */
    .section-header { display: flex; align-items: center; justify-content: space-between; }
    .section-title  { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim); }

    /* ── WEEK STRIP ── */
    .week-nav  { display: flex; align-items: center; gap: 0.5rem; }
    .week-arrow { width: 32px; height: 32px; border-radius: 8px; border: 1.5px solid var(--border); background: transparent; color: var(--text-dim); font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
    .week-arrow:hover:not(:disabled) { background: var(--surface); border-color: var(--accent); color: var(--accent); }
    .week-arrow:disabled { opacity: 0.25; cursor: not-allowed; }
    .week-strip { display: flex; gap: 0.4rem; flex: 1; }
    .day-pill   { flex: 1; background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px; padding: 0.75rem 0.4rem; text-align: center; cursor: pointer; transition: all 0.15s; }
    .day-pill:hover:not(.future) { border-color: var(--accent); }
    .day-pill.selected { background: var(--accent); border-color: var(--accent); color: #E8E2DB; }
    .day-pill.today-marker:not(.selected) { border-color: var(--accent2); border-width: 2px; }
    .day-pill.future   { opacity: 0.3; cursor: not-allowed; }
    .day-name { font-size: 0.6rem; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.5; font-weight: 600; }
    .day-pill.selected .day-name { opacity: 0.75; }
    .day-num  { font-size: 1.1rem; font-weight: 700; margin-top: 0.25rem; }
    .day-dot  { width: 5px; height: 5px; border-radius: 50%; background: var(--accent2); margin: 0.35rem auto 0; }
    .day-pill.selected .day-dot { background: rgba(255,255,255,0.55); }
    .day-pill.no-dot .day-dot { opacity: 0; }

    /* ── STATS ── */
    .stats-row  { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.85rem; }
    .stat-card  { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 1.1rem 1.3rem; }
    .stat-val   { font-size: 1.9rem; font-weight: 800; letter-spacing: -0.02em; line-height: 1; }
    .stat-label { font-size: 0.68rem; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text-dim); margin-top: 0.35rem; font-weight: 600; }
    .stat-bar   { height: 4px; background: var(--border); border-radius: 2px; margin-top: 0.75rem; overflow: hidden; }
    .stat-bar-fill { height: 100%; background: var(--accent2); border-radius: 2px; transition: width 0.4s ease; }

    /* ── TODAY ROWS ── */
    .habit-list { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.75rem; }
    .today-row { background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 0.9rem 1.1rem; display: grid; grid-template-columns: auto 1fr auto auto; align-items: center; gap: 0.9rem; cursor: pointer; transition: all 0.15s; user-select: none; }
    .today-row:hover { border-color: var(--accent); box-shadow: 0 2px 10px rgba(26,50,99,0.07); }
    .today-row.done  { background: var(--accent-light); border-color: #b0c0dc; }
    .today-row.saving { opacity: 0.6; pointer-events: none; }

    .habit-check { width: 24px; height: 24px; border-radius: 6px; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.8rem; flex-shrink: 0; transition: all 0.15s; color: transparent; }
    .today-row.done .habit-check { background: var(--accent); border-color: var(--accent); color: #E8E2DB; }

    .h-name { font-size: 0.92rem; font-weight: 600; color: var(--text); }
    .today-row.done .h-name { opacity: 0.6; text-decoration: line-through; text-decoration-color: var(--text-dim); }
    .h-meta { font-size: 0.68rem; color: var(--text-dim); margin-top: 0.2rem; font-family: 'JetBrains Mono', monospace; }
    .h-streak { font-size: 0.75rem; font-weight: 700; color: var(--accent2); font-family: 'JetBrains Mono', monospace; white-space: nowrap; }
    .mini-chart { display: flex; gap: 3px; align-items: flex-end; }
    .mini-bar   { width: 5px; border-radius: 2px; background: var(--border); }
    .mini-bar.on { background: var(--accent); }

    /* ── HEATMAP ── */
    .heatmap-grid { display: grid; grid-template-columns: repeat(15, 1fr); gap: 4px; margin-top: 0.75rem; }
    .hmap-cell { aspect-ratio:1; border-radius:3px; background: var(--border); }
    .hmap-cell.l1{background:#c5d4ea} .hmap-cell.l2{background:#8aaad0} .hmap-cell.l3{background:#547792} .hmap-cell.l4{background:var(--accent)}

    /* ── MANAGE ── */
    .manage-toolbar { display: flex; align-items: center; justify-content: space-between; }
    .manage-list    { display: flex; flex-direction: column; gap: 0.5rem; }

    .manage-row { background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 1rem 1.1rem; display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 1rem; transition: border-color 0.15s; }
    .manage-row:hover { border-color: var(--text-dim); }

    .manage-row-name { font-size: 0.95rem; font-weight: 700; color: var(--text); }
    .manage-row-meta { font-size: 0.7rem; color: var(--text-dim); margin-top: 0.2rem; font-family: 'JetBrains Mono', monospace; display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .manage-row-actions { display: flex; gap: 0.5rem; align-items: center; }

    .icon-btn { width: 32px; height: 32px; border-radius: 7px; border: 1.5px solid var(--border); background: transparent; color: var(--text-dim); font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .icon-btn.edit:hover  { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
    .icon-btn.trash:hover { background: var(--danger-bg); border-color: #e8a0a0; color: var(--danger); }
    .icon-btn:disabled    { opacity: 0.4; cursor: not-allowed; }

    .active-toggle { width: 36px; height: 20px; border-radius: 10px; background: var(--border); border: none; cursor: pointer; position: relative; transition: background 0.2s; flex-shrink: 0; }
    .active-toggle::after { content:''; position:absolute; top:3px; left:3px; width:14px; height:14px; border-radius:50%; background:#fff; transition: transform 0.2s; }
    .active-toggle.on { background: var(--accent); }
    .active-toggle.on::after { transform: translateX(16px); }
    .active-toggle:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── BADGES ── */
    .cat-badge { display: inline-flex; align-items: center; gap: 0.25rem; font-size: 0.62rem; letter-spacing: 0.06em; text-transform: uppercase; padding: 1px 7px; border-radius: 4px; font-weight: 700; }
    .cat-saglik{background:#ddeeff;color:#1A3263} .cat-zihin{background:#e8f0fb;color:#2a4a8a} .cat-uretim{background:#fff4e0;color:#a06000} .cat-sosyal{background:#fde8f0;color:#8a1a4a}

    /* ── EMPTY STATE ── */
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-dim); font-size: 0.88rem; line-height: 1.7; }
    .empty-state .big { font-size: 2.5rem; margin-bottom: 0.75rem; }

    /* ── TOAST ── */
    .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--text); color: #E8E2DB; padding: 0.6rem 1.4rem; border-radius: 20px; font-size: 0.8rem; font-weight: 600; transition: transform 0.25s ease; z-index: 200; white-space: nowrap; }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.error { background: var(--danger); }

    /* ── MODAL ── */
    .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(10,18,35,0.55); z-index: 50; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
    .modal-backdrop.open { display: flex; }
    .modal { background: var(--bg); border-radius: 16px; padding: 1.75rem; width: 430px; max-width: 92vw; display: flex; flex-direction: column; gap: 1.1rem; box-shadow: 0 20px 60px rgba(26,50,99,0.22); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; }
    .modal-header h2 { font-size: 1.15rem; font-weight: 800; }
    .modal-close { background: none; border: none; font-size: 1.1rem; cursor: pointer; color: var(--text-dim); }
    .modal-close:hover { color: var(--text); }
    .field label { display: block; font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 0.35rem; font-weight: 700; }
    .field input, .field select { width: 100%; padding: 0.65rem 0.9rem; border: 1.5px solid var(--border); border-radius: 8px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.88rem; background: var(--surface); color: var(--text); outline: none; transition: border-color 0.15s; }
    .field input:focus, .field select:focus { border-color: var(--accent); }
    .modal-actions { display: flex; gap: 0.6rem; justify-content: flex-end; padding-top: 0.25rem; }

    /* ── CONFIRM ── */
    .confirm-box { background: var(--bg); border-radius: 14px; padding: 1.75rem; width: 360px; max-width: 92vw; display: flex; flex-direction: column; gap: 1rem; box-shadow: 0 16px 48px rgba(26,50,99,0.2); text-align: center; }
    .confirm-box .icon { font-size: 2rem; }
    .confirm-box h3 { font-size: 1rem; font-weight: 800; }
    .confirm-box p  { font-size: 0.82rem; color: var(--text-dim); line-height: 1.6; }
    .confirm-actions { display: flex; gap: 0.6rem; justify-content: center; }

    @media (max-width: 680px) {
      body { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .heatmap-grid { grid-template-columns: repeat(10, 1fr); }
    }
  </style>
</head>
<body>

  <!-- ═══ SIDEBAR ═══ -->
  <aside class="sidebar">
    <div class="logo"><span class="logo-dot"></span> alışkanlık takip</div>

    <div class="streak-card">
      <div class="streak-num" id="sideStreak">—</div>
      <div class="streak-label">🔥 en uzun seri</div>
    </div>

    <nav class="nav">
      <div class="nav-title">Menü</div>
      <div class="nav-item active" data-page="bugun"> <span class="nav-icon">◉</span> Bugün</div>
      <div class="nav-item"        data-page="manage"><span class="nav-icon">◇</span> Alışkanlıklar</div>
    </nav>

    <div class="db-status">
      <div class="db-dot loading" id="dbDot"></div>
      <span id="dbLabel">Bağlanıyor...</span>
    </div>

    <div class="sidebar-footer">v0.3 · supabase</div>
  </aside>

  <!-- ═══ CONTENT ═══ -->
  <div class="content">
    <div class="page-header">
      <div>
        <h1 id="pageTitle">Bugün</h1>
        <div class="sub" id="pageSub"></div>
      </div>
      <div id="pageAction"></div>
    </div>

    <!-- BUGÜN -->
    <div class="page active" id="page-bugun">
      <div class="week-nav">
        <button class="week-arrow" id="weekPrev" title="Önceki hafta">&#8592;</button>
        <div class="week-strip" id="weekStrip"></div>
        <button class="week-arrow" id="weekNext" title="Sonraki hafta">&#8594;</button>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-val" id="statDone">—</div>
          <div class="stat-label">Bugün Tamamlanan</div>
          <div class="stat-bar"><div class="stat-bar-fill" id="statDoneBar" style="width:0%"></div></div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="statWeek">—</div>
          <div class="stat-label">Bugün Tamamlanma %</div>
          <div class="stat-bar"><div class="stat-bar-fill" id="statWeekBar" style="width:0%"></div></div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="statStreak">—</div>
          <div class="stat-label">En Uzun Seri 🔥</div>
          <div class="stat-bar"><div class="stat-bar-fill" id="statStreakBar" style="width:0%"></div></div>
        </div>
      </div>

      <div>
        <div class="section-header">
          <div class="section-title">Aktif Alışkanlıklar</div>
          <div style="font-size:0.7rem;color:var(--text-dim)" id="doneCount"></div>
        </div>
        <div class="habit-list" id="todayList">
          <div class="loading-overlay"><div class="spinner"></div>Yükleniyor...</div>
        </div>
      </div>

      <div>
        <div class="section-header"><div class="section-title">Son 15 Gün Aktivite</div></div>
        <div class="heatmap-grid" id="heatmap"></div>
      </div>
    </div>

    <!-- ALIŞ KANLIKLAR -->
    <div class="page" id="page-manage">
      <div class="manage-toolbar">
        <div class="section-title">Tüm Alışkanlıklar (<span id="manageCount">—</span>)</div>
        <button class="btn btn-primary btn-sm" id="openAddBtn">+ Yeni Ekle</button>
      </div>
      <div class="manage-list" id="manageList">
        <div class="loading-overlay"><div class="spinner"></div>Yükleniyor...</div>
      </div>
    </div>
  </div>

  <!-- ADD/EDIT MODAL -->
  <div class="modal-backdrop" id="habitModal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Yeni Alışkanlık</h2>
        <button class="modal-close" id="modalCloseBtn">✕</button>
      </div>
      <div class="field">
        <label>Alışkanlık Adı</label>
        <input type="text" id="fName" placeholder="örn. 10 dakika meditasyon" />
      </div>
      <div class="field">
        <label>Kategori</label>
        <select id="fCat">
          <option value="saglik">🏃 Sağlık</option>
          <option value="zihin">📚 Zihin</option>
          <option value="uretim">💻 Üretim</option>
          <option value="sosyal">🤝 Sosyal</option>
        </select>
      </div>
      <div class="field">
        <label>Sıklık</label>
        <select id="fFreq">
          <option>Her gün</option>
          <option>Hafta içi</option>
          <option>Haftada 3</option>
          <option>Haftada 1</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost btn-sm" id="modalCancelBtn">İptal</button>
        <button class="btn btn-primary btn-sm" id="modalSaveBtn">Kaydet</button>
      </div>
    </div>
  </div>

  <!-- CONFIRM MODAL -->
  <div class="modal-backdrop" id="confirmModal">
    <div class="confirm-box">
      <div class="icon">🗑️</div>
      <h3>Alışkanlığı sil?</h3>
      <p id="confirmText"></p>
      <div class="confirm-actions">
        <button class="btn btn-ghost btn-sm" id="confirmCancel">Vazgeç</button>
        <button class="btn btn-danger btn-sm" id="confirmOk">Evet, Sil</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script>
  /* ══════════════════════════════════════════
     SUPABASE INIT
  ══════════════════════════════════════════ */
  const SUPA_URL = 'https://ygorxerdfnumxwmbvsko.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlnb3J4ZXJkZm51bXh3bWJ2c2tvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NTY5NTUsImV4cCI6MjA4ODEzMjk1NX0.TeFVpH10krgEgQQDFcse9YTbSBvMgvfzu_63JjtlHKU';
  const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

  const CAT_LABELS = { saglik:'Sağlık', zihin:'Zihin', uretim:'Üretim', sosyal:'Sosyal' };
  const CAT_ICONS  = { saglik:'🏃',    zihin:'📚',    uretim:'💻',     sosyal:'🤝' };

  const now        = new Date();
  const TODAY      = now.toISOString().split('T')[0]; // "2026-03-03"

  // Selected date state
  let selectedDate = TODAY;             // "YYYY-MM-DD" — currently viewed date
  let weekOffset   = 0;                 // 0 = current week, -1 = last week, etc.

  let HABITS     = [];
  let DATE_DONE  = {};  // { habit_id: log_id }  for selectedDate

  /* ══════════════════════════════════════════
     TOAST
  ══════════════════════════════════════════ */
  function toast(msg, isError = false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast' + (isError ? ' error' : '');
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2800);
  }

  /* ══════════════════════════════════════════
     DB STATUS
  ══════════════════════════════════════════ */
  function setDbStatus(state) {
    const dot   = document.getElementById('dbDot');
    const label = document.getElementById('dbLabel');
    dot.className = 'db-dot ' + state;
    label.textContent = state === 'connected' ? 'Bağlı' : state === 'error' ? 'Bağlantı hatası' : 'Bağlanıyor...';
  }

  /* ══════════════════════════════════════════
     LOAD DATA FROM SUPABASE
  ══════════════════════════════════════════ */
  async function loadAll() {
    setDbStatus('loading');
    try {
      const { data: habits, error: hErr } = await sb
        .from('habits').select('*').order('created_at', { ascending: true });
      if (hErr) throw hErr;
      HABITS = habits;
      setDbStatus('connected');
    } catch (err) {
      console.error(err);
      setDbStatus('error');
      toast('Veritabanına bağlanılamadı 😞', true);
    }
  }

  async function loadLogsForDate(dateStr) {
    try {
      const { data: logs, error } = await sb
        .from('daily_logs')
        .select('id, habit_id')
        .eq('log_date', dateStr)
        .eq('done', true);
      if (error) throw error;
      DATE_DONE = {};
      logs.forEach(l => { DATE_DONE[l.habit_id] = l.id; });
    } catch (err) {
      console.error(err);
      toast('Günlük veriler yüklenemedi 😞', true);
    }
  }

  /* ══════════════════════════════════════════
     NAVIGATION
  ══════════════════════════════════════════ */
  function navigate(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('page-' + pageId).classList.add('active');
    document.querySelector(`[data-page="${pageId}"]`).classList.add('active');

    if (pageId === 'bugun') {
      updatePageHeader();
      renderToday();
    } else {
      document.getElementById('pageTitle').textContent = 'Alışkanlıklar';
      document.getElementById('pageSub').textContent   = `${HABITS.length} alışkanlık tanımlı`;
      renderManage();
    }
  }

  function updatePageHeader() {
    const d     = new Date(selectedDate + 'T12:00:00');
    const isToday = selectedDate === TODAY;
    document.getElementById('pageTitle').textContent =
      isToday ? 'Bugün' : d.toLocaleDateString('tr-TR',{weekday:'long'});
    document.getElementById('pageSub').textContent =
      d.toLocaleDateString('tr-TR',{day:'numeric',month:'long',year:'numeric'});
  }

  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => navigate(item.dataset.page));
  });

  /* ══════════════════════════════════════════
     WEEK STRIP
  ══════════════════════════════════════════ */
  const dayNames = ['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'];

  // Returns "YYYY-MM-DD" for a Date object (local time)
  function toDateStr(d) {
    return d.getFullYear() + '-' +
      String(d.getMonth()+1).padStart(2,'0') + '-' +
      String(d.getDate()).padStart(2,'0');
  }

  // Monday of the week containing `dateStr`, offset by `weekOffset` weeks
  function getWeekStart(dateStr, offset) {
    const d = new Date(dateStr + 'T12:00:00');
    const dow = d.getDay() === 0 ? 6 : d.getDay() - 1; // 0=Mon
    d.setDate(d.getDate() - dow + offset * 7);
    return d;
  }

  function buildWeekStrip() {
    const strip = document.getElementById('weekStrip');
    strip.innerHTML = '';

    const weekStart = getWeekStart(TODAY, weekOffset);

    for (let i = 0; i < 7; i++) {
      const d    = new Date(weekStart);
      d.setDate(weekStart.getDate() + i);
      const dStr = toDateStr(d);
      const isToday    = dStr === TODAY;
      const isSelected = dStr === selectedDate;
      const isFuture   = dStr > TODAY;

      const pill = document.createElement('div');
      let cls = 'day-pill';
      if (isSelected) cls += ' selected';
      if (isToday)    cls += ' today-marker';
      if (isFuture)   cls += ' future no-dot';
      pill.className = cls;
      pill.innerHTML = `<div class="day-name">${dayNames[i]}</div>
                        <div class="day-num">${d.getDate()}</div>
                        <div class="day-dot"></div>`;

      if (!isFuture) {
        pill.addEventListener('click', () => selectDate(dStr));
      }
      strip.appendChild(pill);
    }

    // Arrows
    const prevBtn = document.getElementById('weekPrev');
    const nextBtn = document.getElementById('weekNext');

    prevBtn.onclick = () => { weekOffset--; buildWeekStrip(); };

    // Disable next if this week already contains today
    const weekEnd = new Date(weekStart);
    weekEnd.setDate(weekStart.getDate() + 6);
    const weekEndStr = toDateStr(weekEnd);
    nextBtn.disabled = weekEndStr >= TODAY;
    nextBtn.onclick  = () => { weekOffset++; buildWeekStrip(); };
  }

  async function selectDate(dateStr) {
    if (dateStr > TODAY) return;          // future — block
    selectedDate = dateStr;
    buildWeekStrip();
    updatePageHeader();
    const list = document.getElementById('todayList');
    list.innerHTML = '<div class="loading-overlay"><div class="spinner"></div>Yükleniyor...</div>';
    await loadLogsForDate(selectedDate);
    renderToday();
  }

  buildWeekStrip();

  /* ══════════════════════════════════════════
     HEATMAP (static placeholder)
  ══════════════════════════════════════════ */
  const hmap = document.getElementById('heatmap');
  const lvls = ['','l1','l2','l3','l4'];
  for (let i = 0; i < 15; i++) {
    const cell = document.createElement('div');
    cell.className = 'hmap-cell ' + (i < 13 ? lvls[Math.floor(Math.random()*5)] : 'l4');
    hmap.appendChild(cell);
  }

  /* ══════════════════════════════════════════
     PAGE: BUGÜN
  ══════════════════════════════════════════ */
  function renderToday() {
    const active     = HABITS.filter(h => h.active);
    const doneCount  = active.filter(h => DATE_DONE[h.id] !== undefined).length;
    const pct        = active.length ? Math.round(doneCount / active.length * 100) : 0;
    const maxStreak  = HABITS.reduce((m, h) => Math.max(m, h.streak || 0), 0);
    const isPast     = selectedDate < TODAY;

    document.getElementById('statDone').textContent      = `${doneCount}/${active.length}`;
    document.getElementById('statDoneBar').style.width   = pct + '%';
    document.getElementById('statWeek').textContent      = `${pct}%`;
    document.getElementById('statWeekBar').style.width   = pct + '%';
    document.getElementById('statStreak').textContent    = maxStreak;
    document.getElementById('statStreakBar').style.width = Math.min(maxStreak * 5, 100) + '%';
    document.getElementById('sideStreak').textContent    = maxStreak;
    document.getElementById('doneCount').textContent     = `${doneCount} / ${active.length} tamamlandı`;

    const list = document.getElementById('todayList');
    list.innerHTML = '';

    if (active.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="big">📋</div>Henüz aktif alışkanlık yok.<br>Alışkanlıklar sekmesinden ekleyebilirsin.</div>`;
      return;
    }

    active.forEach(h => {
      const done = DATE_DONE[h.id] !== undefined;
      const row  = document.createElement('div');
      row.className = 'today-row' + (done ? ' done' : '') + (isPast ? ' past' : '');
      row.innerHTML = `
        <div class="habit-check">${done ? '✓' : ''}</div>
        <div>
          <div class="h-name">${h.name}</div>
          <div class="h-meta">
            <span class="cat-badge cat-${h.cat}">${CAT_ICONS[h.cat]} ${CAT_LABELS[h.cat]}</span>
            · ${h.freq}
          </div>
        </div>
        <div class="h-streak">${h.streak > 0 ? '🔥 ' + h.streak : '—'}</div>
        <div class="mini-chart">
          ${(h.bars||[0,0,0,0,0,0,0]).map(b => `<div class="mini-bar ${b?'on':''}" style="height:${7+(b?7:0)}px"></div>`).join('')}
        </div>`;

      row.addEventListener('click', () => toggleDay(h, row));
      list.appendChild(row);
    });
  }

  async function toggleDay(h, row) {
    const wasDone = DATE_DONE[h.id] !== undefined;
    row.classList.add('saving');

    try {
      if (!wasDone) {
        const { data, error } = await sb
          .from('daily_logs')
          .insert({ habit_id: h.id, log_date: selectedDate, done: true })
          .select('id').single();
        if (error) throw error;
        DATE_DONE[h.id] = data.id;

        // Only update streak/bars when marking today
        if (selectedDate === TODAY) {
          h.streak = (h.streak || 0) + 1;
          const newBars = [...(h.bars || [0,0,0,0,0,0,0]).slice(1), 1];
          await sb.from('habits').update({ streak: h.streak, bars: newBars }).eq('id', h.id);
          h.bars = newBars;
        }
        toast(`✓ ${h.name} tamamlandı!`);
      } else {
        const logId = DATE_DONE[h.id];
        const { error } = await sb.from('daily_logs').delete().eq('id', logId);
        if (error) throw error;
        delete DATE_DONE[h.id];

        if (selectedDate === TODAY) {
          h.streak = Math.max(0, (h.streak || 1) - 1);
          const newBars = [...(h.bars || [0,0,0,0,0,0,0]).slice(1), 0];
          await sb.from('habits').update({ streak: h.streak, bars: newBars }).eq('id', h.id);
          h.bars = newBars;
        }
        toast(`↩ ${h.name} geri alındı`);
      }
    } catch (err) {
      console.error(err);
      toast('Kaydedilemedi, tekrar dene 😞', true);
    }

    row.classList.remove('saving');
    renderToday();
  }

  /* ══════════════════════════════════════════
     PAGE: ALIŞ KANLIKLAR
  ══════════════════════════════════════════ */
  function renderManage() {
    document.getElementById('manageCount').textContent = HABITS.length;
    document.getElementById('pageSub').textContent     = `${HABITS.length} alışkanlık tanımlı`;

    const list = document.getElementById('manageList');
    list.innerHTML = '';

    if (HABITS.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="big">✨</div>Henüz alışkanlık eklenmedi.<br>Hemen bir tane ekle!</div>`;
      return;
    }

    HABITS.forEach(h => {
      const row = document.createElement('div');
      row.className = 'manage-row';
      row.innerHTML = `
        <button class="active-toggle ${h.active ? 'on' : ''}" title="${h.active ? 'Aktif — kapat' : 'Pasif — aç'}"></button>
        <div>
          <div class="manage-row-name">${h.name}</div>
          <div class="manage-row-meta">
            <span class="cat-badge cat-${h.cat}">${CAT_ICONS[h.cat]} ${CAT_LABELS[h.cat]}</span>
            <span>· ${h.freq}</span>
            ${h.streak > 0 ? `<span style="color:var(--accent2)">· 🔥 ${h.streak} gün</span>` : ''}
          </div>
        </div>
        <div class="manage-row-actions">
          <button class="icon-btn edit"  title="Düzenle">✎</button>
          <button class="icon-btn trash" title="Sil">🗑</button>
        </div>`;

      // Toggle active
      const toggle = row.querySelector('.active-toggle');
      toggle.addEventListener('click', async () => {
        toggle.disabled = true;
        const newActive = !h.active;
        const { error } = await sb.from('habits').update({ active: newActive }).eq('id', h.id);
        if (error) { toast('Güncellenemedi', true); toggle.disabled = false; return; }
        h.active = newActive;
        toggle.classList.toggle('on', newActive);
        toggle.title = newActive ? 'Aktif — kapat' : 'Pasif — aç';
        toggle.disabled = false;
        toast(newActive ? `${h.name} aktifleştirildi` : `${h.name} pasifleştirildi`);
      });

      row.querySelector('.icon-btn.edit').addEventListener('click',  () => openEdit(h));
      row.querySelector('.icon-btn.trash').addEventListener('click', () => openConfirm(h));

      list.appendChild(row);
    });
  }

  /* ══════════════════════════════════════════
     ADD / EDIT MODAL
  ══════════════════════════════════════════ */
  let editingId = null;

  function openAdd() {
    editingId = null;
    document.getElementById('modalTitle').textContent    = 'Yeni Alışkanlık';
    document.getElementById('modalSaveBtn').textContent  = 'Ekle';
    document.getElementById('fName').value  = '';
    document.getElementById('fCat').value   = 'saglik';
    document.getElementById('fFreq').value  = 'Her gün';
    document.getElementById('habitModal').classList.add('open');
    setTimeout(() => document.getElementById('fName').focus(), 50);
  }

  function openEdit(h) {
    editingId = h.id;
    document.getElementById('modalTitle').textContent    = 'Alışkanlığı Düzenle';
    document.getElementById('modalSaveBtn').textContent  = 'Kaydet';
    document.getElementById('fName').value  = h.name;
    document.getElementById('fCat').value   = h.cat;
    document.getElementById('fFreq').value  = h.freq;
    document.getElementById('habitModal').classList.add('open');
    setTimeout(() => document.getElementById('fName').focus(), 50);
  }

  function closeHabitModal() { document.getElementById('habitModal').classList.remove('open'); }

  async function saveHabit() {
    const name = document.getElementById('fName').value.trim();
    if (!name) { document.getElementById('fName').focus(); return; }
    const cat  = document.getElementById('fCat').value;
    const freq = document.getElementById('fFreq').value;

    const saveBtn = document.getElementById('modalSaveBtn');
    saveBtn.disabled = true;
    saveBtn.textContent = '...';

    try {
      if (editingId !== null) {
        // UPDATE
        const { error } = await sb.from('habits').update({ name, cat, freq }).eq('id', editingId);
        if (error) throw error;
        const h = HABITS.find(x => x.id === editingId);
        if (h) { h.name = name; h.cat = cat; h.freq = freq; }
        toast('Alışkanlık güncellendi ✓');
      } else {
        // INSERT
        const { data, error } = await sb
          .from('habits')
          .insert({ name, cat, freq, streak: 0, active: true, bars: [0,0,0,0,0,0,0] })
          .select()
          .single();
        if (error) throw error;
        HABITS.push(data);
        toast('Yeni alışkanlık eklendi ✓');
      }
      closeHabitModal();
      renderManage();
    } catch (err) {
      console.error(err);
      toast('Kaydedilemedi 😞', true);
    }

    saveBtn.disabled = false;
    saveBtn.textContent = editingId ? 'Kaydet' : 'Ekle';
  }

  document.getElementById('openAddBtn').addEventListener('click', openAdd);
  document.getElementById('modalCloseBtn').addEventListener('click', closeHabitModal);
  document.getElementById('modalCancelBtn').addEventListener('click', closeHabitModal);
  document.getElementById('modalSaveBtn').addEventListener('click', saveHabit);
  document.getElementById('fName').addEventListener('keydown', e => { if (e.key === 'Enter') saveHabit(); });
  document.getElementById('habitModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeHabitModal(); });

  /* ══════════════════════════════════════════
     CONFIRM DELETE
  ══════════════════════════════════════════ */
  let deleteId = null;

  function openConfirm(h) {
    deleteId = h.id;
    document.getElementById('confirmText').textContent = `"${h.name}" alışkanlığı ve tüm geçmişi kalıcı olarak silinecek.`;
    document.getElementById('confirmModal').classList.add('open');
  }

  function closeConfirm() {
    document.getElementById('confirmModal').classList.remove('open');
    deleteId = null;
  }

  document.getElementById('confirmCancel').addEventListener('click', closeConfirm);
  document.getElementById('confirmModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeConfirm(); });

  document.getElementById('confirmOk').addEventListener('click', async () => {
    if (deleteId === null) return;
    const okBtn = document.getElementById('confirmOk');
    okBtn.disabled = true;
    okBtn.textContent = '...';

    const { error } = await sb.from('habits').delete().eq('id', deleteId);
    if (error) {
      toast('Silinemedi 😞', true);
      okBtn.disabled = false; okBtn.textContent = 'Evet, Sil';
      return;
    }

    const name = HABITS.find(h => h.id === deleteId)?.name;
    HABITS = HABITS.filter(h => h.id !== deleteId);
    delete TODAY_DONE[deleteId];
    closeConfirm();
    renderManage();
    toast(`"${name}" silindi`);
    okBtn.disabled = false; okBtn.textContent = 'Evet, Sil';
  });

  /* ══════════════════════════════════════════
     INIT
  ══════════════════════════════════════════ */
  (async () => {
    await loadAll();
    await loadLogsForDate(selectedDate);
    navigate('bugun');
  })();
  </script>

</body>
