<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ecem ❤️</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap');

    :root {
      --bg: #0a0a0a;
      --fg: #f0ede6;
      --accent: #c8f564;
      --pink: #ff6eb4;
      --dim: #3a3a3a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--bg);
      color: var(--fg);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--dim) 1px, transparent 1px),
        linear-gradient(90deg, var(--dim) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.15;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    .label {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.2s;
    }

    .label span {
      background: var(--accent);
      color: var(--bg);
      padding: 2px 10px;
      border-radius: 2px;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(3rem, 10vw, 7rem);
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--fg);
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.5s;
    }

    h1 em { font-style: italic; color: var(--pink); }

    .love-text {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.2rem, 4vw, 2.2rem);
      color: var(--pink);
      font-style: italic;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.8s;
    }

    .surprise-btn {
      background: transparent;
      border: 1.5px solid var(--pink);
      color: var(--pink);
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.9rem 2.2rem;
      border-radius: 2px;
      cursor: pointer;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 1.1s;
      transition: background 0.2s, color 0.2s, transform 0.1s;
    }

    .surprise-btn:hover { background: var(--pink); color: var(--bg); }
    .surprise-btn:active { transform: scale(0.97); }

    /* OVERLAY */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.93);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      padding: 2rem;
    }

    .overlay.active { display: flex; }

    .surprise-text {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1rem, 2.5vw, 1.5rem);
      color: var(--pink);
      text-align: center;
      line-height: 2;
      max-width: 680px;
      animation: pulse 1.8s ease-in-out infinite;
    }

    /* Dancing dog */
    .dog-scene {
      position: relative;
      width: 140px;
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dog {
      font-size: 4rem;
      position: absolute;
      animation: orbit 0.7s linear infinite;
    }

    .tail {
      font-size: 2rem;
      position: absolute;
      animation: orbit 0.7s linear infinite;
      animation-delay: -0.35s;
    }

    .close-btn {
      background: transparent;
      border: 1.5px solid #444;
      color: #666;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.6rem 1.8rem;
      border-radius: 2px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .close-btn:hover { border-color: #888; color: #ccc; }

    /* Floating hearts */
    .heart {
      position: fixed;
      font-size: 1.8rem;
      pointer-events: none;
      z-index: 200;
      animation: flyHeart 2.2s ease-out forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.02); }
    }

    @keyframes orbit {
      0%   { transform: rotate(0deg)   translateX(45px) rotate(0deg); }
      100% { transform: rotate(360deg) translateX(45px) rotate(-360deg); }
    }

    @keyframes flyHeart {
      0%   { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-350px) scale(0.3) rotate(30deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="container">
    <p class="label"><span>hello world</span></p>
    <h1>Hello, <em>World</em></h1>
    <p class="love-text">Ecem seni seviyorum 🩷</p>
    <button class="surprise-btn" id="surpriseBtn">✨ sürpriz için tıkla</button>
  </div>

  <div class="overlay" id="overlay">
    <p class="surprise-text">
      hanimişbenim tatlişim<br>
      mottişimdemottişim mottişimdemottişim<br>
      hanimişigottigottişim<br>
      hanimişigotti hanimişigottigottişim<br>
      ballısıdaballısı ballısıdaballısı<br>
      hanimisibenimgottisim<br>
      gottiside gottisim 🩷
    </p>

    <div class="dog-scene">
      <span class="dog">🐶</span>
      <span class="tail">🐾</span>
    </div>

    <button class="close-btn" id="closeBtn">kapat</button>
  </div>

  <script>
    const btn = document.getElementById('surpriseBtn');
    const overlay = document.getElementById('overlay');
    const closeBtn = document.getElementById('closeBtn');
    const hearts = ['🩷', '❤️', '💕', '💖', '🌸', '💝'];

    function spawnHearts() {
      for (let i = 0; i < 25; i++) {
        setTimeout(() => {
          const el = document.createElement('div');
          el.classList.add('heart');
          el.textContent = hearts[Math.floor(Math.random() * hearts.length)];
          el.style.left = (Math.random() * 95) + 'vw';
          el.style.bottom = '10vh';
          document.body.appendChild(el);
          setTimeout(() => el.remove(), 2200);
        }, i * 80);
      }
    }

    btn.addEventListener('click', () => {
      overlay.classList.add('active');
      spawnHearts();
      setInterval(spawnHearts, 3000);
    });

    closeBtn.addEventListener('click', () => {
      overlay.classList.remove('active');
    });
  </script>

</body>
</html>
